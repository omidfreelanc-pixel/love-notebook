<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>دفترچه عاشقانه</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="loading-screen">
    <div class="loading-cat">🐱</div>
    <p>در حال باز کردن دفترچه...</p>
  </div>

  <div id="app" class="hidden">

    <!-- ===== DIARY TAB ===== -->
    <section id="tab-diary" class="tab active">
      <div class="book">
        <div class="book-spine"></div>
        <div id="diary-flip" class="diary-page">
          <div class="diary-header">
            <p id="daily-poem" class="daily-poem"></p>
            <div class="date-nav">
              <button id="diary-prev" class="date-arrow" aria-label="روز قبل">‹</button>
              <button id="diary-cal-btn" class="jalali-date" type="button">
                <span id="jalali-date"></span> 📅
              </button>
              <button id="diary-next" class="date-arrow" aria-label="روز بعد">›</button>
              <input type="date" id="diary-date-input" class="date-hidden-input" />
            </div>
          </div>
          <textarea id="diary-textarea" class="diary-textarea" placeholder="امروز چی توی دلت بود؟..."></textarea>
          <div id="save-indicator" class="save-indicator"></div>
          <div class="cat-walk-wrap">
            <div id="walking-cat" class="walking-cat">🐈</div>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== DATE SUGGESTION TAB ===== -->
    <section id="tab-date" class="tab">
      <h2 class="tab-title">دیت کجا بریم؟</h2>
      <form id="date-form" class="glass-form">
        <label>فاز امروزتون چیه؟
          <select name="mood" required>
            <option value="آروم و رمانتیک">آروم و رمانتیک</option>
            <option value="پرانرژی و شلوغ">پرانرژی و شلوغ</option>
            <option value="نوستالژیک">نوستالژیک</option>
            <option value="ماجراجویانه">ماجراجویانه</option>
          </select>
        </label>
        <label>بودجه تقریبی
          <select name="budget" required>
            <option value="کم">کم (زیر ۵۰۰ تومن)</option>
            <option value="متوسط">متوسط</option>
            <option value="بدون محدودیت">بدون محدودیت</option>
          </select>
        </label>
        <label>ترجیح
          <select name="location_pref" required>
            <option value="بیرون">بیرون از خونه</option>
            <option value="خونه">تو خونه</option>
          </select>
        </label>
        <label>شهر
          <input type="text" name="city" placeholder="مثلاً تهران" required />
        </label>
        <button type="submit">پیشنهاد بده ✨</button>
      </form>
      <div id="date-result" class="result-box hidden"></div>
    </section>

    <!-- ===== ALBUM TAB ===== -->
    <section id="tab-album" class="tab">
      <h2 class="tab-title">آلبوم عکس‌هامون</h2>
      <label class="upload-btn">
        📷 افزودن عکس
        <input type="file" id="photo-input" accept="image/*" hidden />
      </label>

      <div class="album-book">
        <div id="album-spread" class="album-spread"></div>
        <div class="album-nav">
          <button id="album-prev" class="date-arrow" aria-label="صفحه قبل">‹</button>
          <span id="album-pageinfo" class="album-pageinfo"></span>
          <button id="album-next" class="date-arrow" aria-label="صفحه بعد">›</button>
        </div>
      </div>
    </section>

    <!-- ===== GIFT TAB ===== -->
    <section id="tab-gift" class="tab">
      <h2 class="tab-title">کادو می‌خوام</h2>
      <form id="gift-form" class="glass-form">
        <label>مناسبت چیه؟
          <input type="text" name="occasion" placeholder="مثلاً سالگرد، تولد..." required />
        </label>
        <label>بودجه تقریبی
          <input type="text" name="budget" placeholder="مثلاً تا ۲ میلیون تومن" required />
        </label>
        <label>سلیقه/علایقش چیه؟
          <textarea name="interests" placeholder="مثلاً عاشق کتابه، به عطر علاقه داره..." required></textarea>
        </label>
        <button type="submit">پیشنهاد بده 🎁</button>
      </form>
      <div id="gift-result" class="result-box hidden"></div>
    </section>

    <!-- ===== REMINDERS TAB ===== -->
    <section id="tab-reminders" class="tab">
      <h2 class="tab-title">یادآوری‌ها</h2>
      <form id="reminder-form" class="glass-form">
        <label>یادداشت یادآوری
          <textarea name="note" placeholder="مثلاً: سالگرد آشناییمونه، یادت نره ❤️" required></textarea>
        </label>
        <label>تاریخ یادآوری
          <input type="date" name="remind_date" required />
        </label>
        <label>برای کی؟
          <select name="target" required>
            <option value="me">خودم</option>
            <option value="partner">عشقم</option>
          </select>
        </label>
        <button type="submit" class="btn-square">ثبت یادآوری ⏰</button>
      </form>
      <p class="hint">در تاریخ انتخاب‌شده، ربات این یادداشت رو برای شخص مشخص‌شده می‌فرسته.</p>
      <div id="reminders-list" class="card-list"></div>
    </section>

    <!-- ===== PROMISES TAB ===== -->
    <section id="tab-promises" class="tab">
      <h2 class="tab-title">قول‌هامون</h2>
      <form id="promise-form" class="glass-form">
        <label>قول چیه؟
          <textarea name="note" placeholder="مثلاً: قول می‌دم هر جمعه برات گل بخرم 🌹" required></textarea>
        </label>
        <label>تاریخ قول
          <input type="date" name="promise_date" required />
        </label>
        <label>کی به کی قول می‌ده؟
          <select name="direction" required>
            <option value="i_promise">من به عشقم قول می‌دم</option>
            <option value="partner_promises">عشقم به من قول می‌ده</option>
          </select>
        </label>
        <button type="submit" class="btn-square">ثبت قول 🤝</button>
      </form>
      <div id="promises-list" class="card-list"></div>
    </section>

    <!-- ===== PLAYLIST TAB ===== -->
    <section id="tab-playlist" class="tab">
      <h2 class="tab-title">آهنگ‌هامون 🎵</h2>
      <p class="hint">هر آهنگ یا ویس که برای ربات بفرستید، خودکار همینجا ثبت می‌شه.</p>
      <div id="playlist-list" class="card-list"></div>
    </section>

    <!-- ===== BOTTOM NAV ===== -->
    <nav class="bottom-nav">
      <button class="nav-btn active" data-tab="tab-diary">📖<span>دفترچه</span></button>
      <button class="nav-btn" data-tab="tab-date">💑<span>دیت</span></button>
      <button class="nav-btn" data-tab="tab-album">📸<span>آلبوم</span></button>
      <button class="nav-btn" data-tab="tab-gift">🎁<span>کادو</span></button>
      <button class="nav-btn" data-tab="tab-reminders">⏰<span>یادآوری</span></button>
      <button class="nav-btn" data-tab="tab-promises">🤝<span>قول‌ها</span></button>
      <button class="nav-btn" data-tab="tab-playlist">🎵<span>آهنگ‌ها</span></button>
    </nav>

  </div>

  <div id="error-screen" class="hidden">
    <p>😿 مشکلی پیش اومد. لطفاً دوباره از تلگرام بازش کن.</p>
    <p id="error-detail" class="error-detail"></p>
  </div>

  <script src="js/poems.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/diary.js"></script>
  <script src="js/album.js"></script>
  <script src="js/dateSuggest.js"></script>
  <script src="js/gift.js"></script>
  <script src="js/reminders.js"></script>
  <script src="js/promises.js"></script>
  <script src="js/playlist.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
